<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invest Pro — SmartCalc™ Financial Analytics</title>
    
    <link rel="icon" type="image/jpeg" href="pulse.jpg">
    <style>
        :root {
            --primary: #3b82f6; /* Новый благородный синий */
            --primary-soft: #eff6ff;
            --dark: #0f172a; /* Глубокий темный */
            --bg: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { margin: 0; font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text-main); line-height: 1.6; }

        header { background: var(--dark); color: white; padding: 3.5rem 1rem; text-align: center; }
        .logo { font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; text-transform: uppercase; }
        .logo span { color: var(--primary); }

        .wrapper { max-width: 1100px; margin: -50px auto 60px; padding: 0 20px; display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 30px; }

        .glass-card { background: white; border-radius: 24px; padding: 45px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        
        .control-group { margin-bottom: 30px; }
        .label-box { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
        .label-box label { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .current-val { font-size: 1.5rem; font-weight: 800; color: var(--dark); }

        input[type=range] { width: 100%; appearance: none; background: #e2e8f0; height: 8px; border-radius: 10px; outline: none; }
        input[type=range]::-webkit-slider-thumb { 
            appearance: none; width: 26px; height: 26px; background: white; border: 4px solid var(--primary); 
            border-radius: 50%; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }

        .result-panel { text-align: center; background: white; border-radius: 24px; padding: 50px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); border-top: 6px solid var(--primary); height: fit-content; position: sticky; top: 20px; }
        .score-label { font-weight: 800; color: var(--text-muted); letter-spacing: 2px; font-size: 0.7rem; text-transform: uppercase; }
        .score-num { font-size: 4rem; font-weight: 900; color: var(--dark); letter-spacing: -3px; margin: 10px 0; line-height: 1; }
        .profit-badge { display: inline-block; padding: 8px 24px; border-radius: 100px; font-weight: 700; font-size: 0.95rem; background: var(--primary-soft); color: var(--primary); }

        .btn-action { width: 100%; margin-top: 35px; padding: 18px; border: none; border-radius: 14px; background: var(--dark); color: white; font-weight: 700; cursor: pointer; transition: var(--transition); }
        .btn-action:hover { background: var(--primary); transform: translateY(-2px); }

        .eco-section { grid-column: span 2; padding: 40px; background: white; border-radius: 24px; border: 1px solid #e2e8f0; }
        .eco-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-top: 20px; }
        .eco-link { padding: 20px; border: 1px solid #f1f5f9; border-radius: 16px; text-decoration: none; color: inherit; transition: 0.3s; }
        .eco-link:hover { border-color: var(--primary); background: var(--primary-soft); transform: translateY(-3px); }

        @media (max-width: 850px) { .wrapper { grid-template-columns: 1fr; } .score-num { font-size: 3rem; } }
    </style>
</head>
<body>

<header>
    <div class="logo">Smart<span>Calc</span> Invest</div>
</header>

<main class="wrapper">
    <section class="glass-card">
        <div class="control-group">
            <div class="label-box"><label>Initial Capital</label><span class="current-val" id="dep-txt">$5,000</span></div>
            <input type="range" id="dep-in" min="1000" max="100000" step="1000" value="5000">
        </div>
        <div class="control-group">
            <div class="label-box"><label>Annual Return (%)</label><span class="current-val" id="int-txt">10%</span></div>
            <input type="range" id="int-in" min="1" max="40" step="0.5" value="10">
        </div>
        <div class="control-group">
            <div class="label-box"><label>Duration</label><span class="current-val" id="year-txt">10 Years</span></div>
            <input type="range" id="year-in" min="1" max="50" step="1" value="10">
        </div>

        <div style="background: var(--primary-soft); padding: 20px; border-radius: 16px; border-left: 4px solid var(--primary); font-size: 0.9rem;">
            <p style="margin: 0; color: var(--text-main); font-weight: 600;">Wealth Projection</p>
            <p id="multiplier" style="margin: 5px 0 0 0; color: var(--primary); font-weight: 800; font-size: 1.2rem;">2.6x Capital Multiplier</p>
        </div>
    </section>

    <section class="result-panel">
        <div class="score-label">Future Value</div>
        <div class="score-num" id="total-val">$12,968</div>
        <div class="profit-badge" id="profit-txt">+ $7,968 Profit</div>
        <button class="btn-action" onclick="window.print()">Export Financial Plan</button>
    </section>

    <article class="eco-section">
        <h3 style="margin-top:0">SmartCalc™ Ecosystem</h3>
        <div class="eco-grid">
            <a href="https://n1043mn1ght-web.github.io" class="eco-link"><strong>Health Pro</strong><br><small>Precision BMI analytics</small></a>
            <a href="https://n1043mn1ght-web.github.io" class="eco-link"><strong>Utilities Hub</strong><br><small>Daily essential tools</small></a>
        </div>
    </article>
</main>

<script>
    const depIn = document.getElementById('dep-in'), intIn = document.getElementById('int-in'), yearIn = document.getElementById('year-in'),
          depTxt = document.getElementById('dep-txt'), intTxt = document.getElementById('int-txt'), yearTxt = document.getElementById('year-txt'),
          totalVal = document.getElementById('total-val'), profitTxt = document.getElementById('profit-txt'), multTxt = document.getElementById('multiplier');

    function update() {
        const p = parseFloat(depIn.value), r = parseFloat(intIn.value) / 100, t = parseFloat(yearIn.value);
        const fv = p * Math.pow((1 + r), t);
        const profit = fv - p;

        depTxt.innerText = '$' + p.toLocaleString();
        intTxt.innerText = (r * 100).toFixed(1) + '%';
        yearTxt.innerText = t + ' Years';
        multTxt.innerText = (fv/p).toFixed(1) + 'x Capital Multiplier';

        totalVal.innerText = '$' + Math.round(fv).toLocaleString();
        profitTxt.innerText = '+ $' + Math.round(profit).toLocaleString() + ' Profit';
    }

    [depIn, intIn, yearIn].forEach(el => el.addEventListener('input', update));
    update();
</script>
</body>
</html>
